{% extends 'base.html' %}

{% block title %}Memory Match Game 🧠{% endblock %}

{% block content %}
<div class="dashboard-container">
    <h1 style="color: #000428; text-align: center; margin-bottom: 30px;">🧠 Memory Match: Vocabulary</h1>

    <div style="text-align: center; margin-bottom: 20px; color: #666;">
        <p>Find the matching pairs: <strong>English Word</strong> and its <strong>Portuguese Translation</strong>.</p>
        <p>Moves: <span id="move-count" style="font-weight: bold; color: var(--primary);">0</span></p>
    </div>

    <!-- Game Grid -->
    <div class="memory-grid" id="memory-grid">
        <!-- Cards generated by JS -->
    </div>

    <!-- Win Message -->
    <div id="win-message" style="display: none; text-align: center; margin-top: 30px;">
        <h2 style="color: #00E676;">Congratulations! 🎉</h2>
        <p>You matched all pairs!</p>
        <button onclick="startGame()"
            style="padding: 10px 20px; background: var(--secondary); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem;">
            Play Again 🔄
        </button>
    </div>

</div>

<style>
    .memory-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        max-width: 800px;
        margin: 0 auto;
        perspective: 1000px;
    }

    .memory-card {
        background-color: transparent;
        height: 120px;
        cursor: pointer;
        position: relative;
    }

    .memory-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.6s;
        transform-style: preserve-3d;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .memory-card.flipped .memory-card-inner {
        transform: rotateY(180deg);
    }

    .memory-card-front,
    .memory-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        font-weight: bold;
        font-size: 1.1rem;
        padding: 10px;
        box-sizing: border-box;
    }

    /* Front is the "back" of the card (hidden state) - usually a pattern or color */
    .memory-card-front {
        background: linear-gradient(135deg, #004e92, #000428);
        color: white;
        font-size: 2rem;
    }

    /* Back is the "face" of the card (revealed state) */
    .memory-card-back {
        background-color: white;
        color: #000428;
        transform: rotateY(180deg);
        border: 2px solid #004e92;
    }

    .matched .memory-card-inner {
        /* Optional: Change style for matched cards */
        box-shadow: 0 0 10px #00E676;
    }

    @media (max-width: 600px) {
        .memory-grid {
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .memory-card {
            height: 100px;
        }

        .memory-card-back {
            font-size: 0.9rem;
        }
    }
</style>

<script>
    const cardsData = [
        { en: "Father", pt: "Pai" },
        { en: "Mother", pt: "Mãe" },
        { en: "Brother", pt: "Irmão" },
        { en: "Sister", pt: "Irmã" },
        { en: "Hello", pt: "Olá" },
        { en: "Blue", pt: "Azul" }, // Added some colors too!
    ];

    let grid = document.getElementById('memory-grid');
    let moves = 0;
    let flippedCards = [];
    let matchedPairs = 0;
    let lockBoard = false;

    function startGame() {
        grid.innerHTML = '';
        moves = 0;
        matchedPairs = 0;
        document.getElementById('move-count').innerText = moves;
        document.getElementById('win-message').style.display = 'none';

        // Create pairs
        let gameCards = [];
        cardsData.forEach(pair => {
            gameCards.push({ id: pair.en, text: pair.en, type: 'en' });
            gameCards.push({ id: pair.en, text: pair.pt, type: 'pt' }); // id is same for matching
        });

        // Shuffle
        gameCards.sort(() => Math.random() - 0.5);

        // Render
        gameCards.forEach(card => {
            const cardEl = document.createElement('div');
            cardEl.classList.add('memory-card');
            cardEl.dataset.name = card.id;

            cardEl.innerHTML = `
                <div class="memory-card-inner">
                    <div class="memory-card-front">?</div>
                    <div class="memory-card-back">${card.text}</div>
                </div>
            `;

            cardEl.addEventListener('click', flipCard);
            grid.appendChild(cardEl);
        });
    }

    function flipCard() {
        if (lockBoard) return;
        if (this === flippedCards[0]) return;

        this.classList.add('flipped');

        if (flippedCards.length === 0) {
            flippedCards.push(this);
            return;
        }

        flippedCards.push(this);
        checkForMatch();
    }

    function checkForMatch() {
        moves++;
        document.getElementById('move-count').innerText = moves;

        let isMatch = flippedCards[0].dataset.name === flippedCards[1].dataset.name;

        isMatch ? disableCards() : unflipCards();
    }

    function disableCards() {
        flippedCards[0].classList.add('matched');
        flippedCards[1].classList.add('matched');

        // Remove listeners
        flippedCards[0].removeEventListener('click', flipCard);
        flippedCards[1].removeEventListener('click', flipCard);

        flippedCards = [];
        matchedPairs++;

        if (matchedPairs === cardsData.length) {
            setTimeout(() => {
                document.getElementById('win-message').style.display = 'block';
            }, 500);
        }
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            flippedCards[0].classList.remove('flipped');
            flippedCards[1].classList.remove('flipped');
            flippedCards = [];
            lockBoard = false;
        }, 1000);
    }

    startGame();
</script>
{% endblock %}
