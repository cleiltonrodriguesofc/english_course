{% extends 'base.html' %}

{% block title %}Login - English Course{% endblock %}

{% block content %}
<div
    style="max-width: 400px; margin: 50px auto; padding: 30px; background: white; color: #333; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: var(--primary); margin-bottom: 30px;">Login 🔐</h2>

    <form method="post">
        {% csrf_token %}

        {% if form.errors %}
        <div style="background: #ffebee; color: #c62828; padding: 10px; border-radius: 5px; margin-bottom: 20px;">
            Invalid username or password.
        </div>
        {% endif %}

        <div style="margin-bottom: 20px;">
            <label for="id_username" style="display: block; margin-bottom: 5px; font-weight: bold;">Username</label>
            {{ form.username }}
        </div>

        <div style="margin-bottom: 25px;">
            <label for="id_password" style="display: block; margin-bottom: 5px; font-weight: bold;">Password</label>
            {{ form.password }}
        </div>

        <button type="submit"
            style="width: 100%; padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; font-weight: bold;">
            Login
        </button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        Don't have an account? <a href="{% url 'register' %}"
            style="color: var(--secondary); font-weight: bold;">Register here</a>
    </p>
</div>

<style>
    /* Form inputs styling override */
    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
        border-color: var(--secondary);
        outline: none;
    }
</style>
{% endblock %}
